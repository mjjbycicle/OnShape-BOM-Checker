<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>OnShape BOM Checker</title>
	<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1d23 0%, #252b34 100%);
            color: #e0e3e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff6b35 0%, #f77d42 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 14px;
            color: #a0a5b0;
        }

        .card {
            background: #2a2f38;
            border: 1px solid #3a3f48;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-of-type {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #b0b5c0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #1f2329;
            border: 1px solid #3a3f48;
            border-radius: 4px;
            color: #e0e3e8;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        input::placeholder {
            color: #6a7078;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-search {
            background: linear-gradient(135deg, #ff6b35 0%, #f77d42 100%);
            color: white;
        }

        .btn-search:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-search:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-search:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #3a3f48;
            color: #e0e3e8;
        }

        .btn-clear:hover {
            background: #454b54;
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-container.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-card {
            background: #1f2329;
            border: 1px solid #3a3f48;
            border-radius: 8px;
            padding: 24px;
        }

        .result-header {
            border-bottom: 2px solid #ff6b35;
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 20px;
            font-weight: 600;
            color: #e0e3e8;
        }

        .result-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #3a3f48;
        }

        .result-field:last-child {
            border-bottom: none;
        }

        .result-label {
            font-size: 12px;
            font-weight: 600;
            color: #a0a5b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .result-value {
            font-size: 14px;
            color: #ff6b35;
            font-weight: 500;
            text-align: right;
            flex: 1;
            margin-left: 20px;
        }

        .error-message {
            background: #3a2424;
            border: 1px solid #8b4545;
            border-radius: 4px;
            padding: 14px;
            color: #ff9999;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #3a3f48;
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #a0a5b0;
            font-size: 13px;
            margin-top: 10px;
        }

        .info-box {
            background: #243447;
            border-left: 3px solid #ff6b35;
            border-radius: 4px;
            padding: 12px 14px;
            margin-top: 16px;
            font-size: 12px;
            color: #a0a5b0;
        }
	</style>
</head>
<body>
	<div class="container">
		<div class="header">
			<h1 class="header-title">OnShape BOM Checker</h1>
			<p class="header-subtitle">Extract detailed part information from your assemblies</p>
		</div>

		<div class="card">
			<form id="searchForm" onsubmit="handleSearch(event)">
				<div class="form-group">
					<label for="onshapeURL">OnShape Assembly URL</label>
					<input
							type="url"
							id="onshapeURL"
							placeholder="https://cad.onshape.com/documents/..."
							required
					/>
				</div>

				<div class="form-group">
					<label for="partName">Part Name</label>
					<input
							type="text"
							id="partName"
							placeholder="Enter the part name to search for"
							required
					/>
				</div>

				<div class="button-group">
					<button type="submit" class="btn-search" id="searchBtn">
						Search Part
					</button>
					<button type="button" class="btn-clear" onclick="clearForm()">
						Clear
					</button>
				</div>

				<div class="info-box">
					💡 Make sure you have access to the OnShape document and the assembly contains the part you're
					searching for.
				</div>
			</form>

			<div class="loading" id="loading">
				<div class="spinner"></div>
				<div class="loading-text">Fetching part information...</div>
			</div>

			<div class="error-message" id="errorMessage"></div>

			<div class="result-container" id="resultContainer">
				<div class="result-card">
					<div class="result-header">
						<div class="result-title" id="resultTitle">Part Information</div>
					</div>

					<div class="result-field">
						<div class="result-label">Name</div>
						<div class="result-value" id="resultName">-</div>
					</div>

					<div class="result-field">
						<div class="result-label">Mass</div>
						<div class="result-value" id="resultMass">-</div>
					</div>

					<div class="result-field">
						<div class="result-label">Revision</div>
						<div class="result-value" id="resultRevision">-</div>
					</div>

					<div class="result-field">
						<div class="result-label">Description</div>
						<div class="result-value" id="resultDescription">-</div>
					</div>

					<div class="result-field">
						<div class="result-label">Material</div>
						<div class="result-value" id="resultMaterial">-</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script type="module">
        import {getPart} from './bom-utils.js';

        window.handleSearch = async function (event) {
            event.preventDefault();

            const onshapeURL = document.getElementById('onshapeURL').value;
            const partName = document.getElementById('partName').value;

            // Clear previous results and errors
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('resultContainer').classList.remove('show');

            // Show loading spinner
            document.getElementById('loading').classList.add('show');
            document.getElementById('searchBtn').disabled = true;

            const partInfo = await getPart(onshapeURL, partName);
            displayResults(partInfo);
            document.getElementById('loading').classList.remove('show');
            document.getElementById('searchBtn').disabled = false;
        };

        window.displayResults = function (data) {
            document.getElementById('resultTitle').textContent = data.name;
            document.getElementById('resultName').textContent = data.name;
            document.getElementById('resultMass').textContent = data.mass;
            document.getElementById('resultRevision').textContent = data.revision;
            document.getElementById('resultDescription').textContent = data.description;
            document.getElementById('resultMaterial').textContent = data.material;

            document.getElementById('resultContainer').classList.add('show');
        };

        window.showError = function (message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = '❌ ' + message;
            errorEl.classList.add('show');
        };

        window.clearForm = function () {
            document.getElementById('searchForm').reset();
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('resultContainer').classList.remove('show');
            document.getElementById('onshapeURL').focus();
        };
	</script>
</body>
</html>
